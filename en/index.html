<script>
/* Автоматически ставит кнопки под текстом, даже если меняется подзаголовок */
(function () {
  function getCssNumber(name, fallback) {
    var value = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    var number = parseFloat(value);
    return isNaN(number) ? fallback : number;
  }

  function adjustHeroButtons() {
    var rec = document.querySelector('#rec1998209382');
    if (!rec) return;

    var artboard = rec.querySelector('.t396__artboard');
    var titleElem = rec.querySelector('[data-elem-id="1779691672984000001"]');
    var titleAtom = titleElem ? titleElem.querySelector('.hero-heading') : null;
    var buttons = rec.querySelector('.tn-group[data-group-id="1776253009297000002"]');

    if (!artboard || !titleElem || !titleAtom || !buttons) return;

    var gap = getCssNumber('--hero-gap-text-buttons', 14);
    var newTop = titleElem.offsetTop + titleAtom.offsetHeight + gap;

    buttons.style.top = newTop + 'px';

    var buttonsHeight = buttons.offsetHeight || 54;
    var newHeight = newTop + buttonsHeight + 8;

    if (newHeight > artboard.offsetHeight) {
      artboard.style.height = newHeight + 'px';
      var carrier = rec.querySelector('.t396__carrier');
      var filter = rec.querySelector('.t396__filter');
      if (carrier) carrier.style.height = newHeight + 'px';
      if (filter) filter.style.height = newHeight + 'px';
    }
  }

  window.addEventListener('load', adjustHeroButtons);
  window.addEventListener('resize', adjustHeroButtons);
  setTimeout(adjustHeroButtons, 300);
  setTimeout(adjustHeroButtons, 1000);
})();
</script>
